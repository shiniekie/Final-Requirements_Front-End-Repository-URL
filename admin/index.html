<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarTTech — Marketplace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <!-- TOPBAR -->
    <header class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      <div class="logo">CarT<span>Tech</span></div>
      <div class="spacer"></div>
      <button
        class="notif-btn"
        onclick="toggleNotifPanel()"
        title="Notifications"
      >
        <i class="bi bi-bell"></i>
        <div class="notif-badge" id="notifDot"></div>
      </button>
      <div
        class="user-avatar"
        onclick="navigate('profile')"
        title="My Profile"
        id="avatarInitials"
      >
        AD
      </div>
    </header>

    <!-- Sidebar Overlay (mobile) -->
    <div
      class="sidebar-overlay"
      id="sidebarOverlay"
      onclick="toggleSidebar()"
    ></div>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Main</div>
        <div
          class="nav-item"
          data-page="dashboard"
          onclick="navigate('dashboard')"
        >
          <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Management</div>
        <div class="nav-item" data-page="users" onclick="navigate('users')">
          <i class="bi bi-people-fill"></i> Users
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Account</div>
        <div class="nav-item" data-page="profile" onclick="navigate('profile')">
          <i class="bi bi-person-circle"></i> Profile
        </div>
        <div class="nav-item" onclick="Logout()">
          <i class="bi bi-arrow-right"></i> Logout
        </div>
      </div>
    </nav>

    <!-- NOTIFICATION PANEL -->
    <div class="notif-panel" id="notifPanel">
      <div class="notif-panel-head">
        <span>Notifications</span>
        <button
          class="btn-ghost"
          style="padding: 4px 10px; font-size: 12px"
          onclick="markAllRead()"
        >
          Mark all read
        </button>
      </div>
      <div id="notifList"></div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-wrap" id="toastWrap"></div>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="app">
      <!-- Pages will be dynamically loaded here -->
      <div class="text-center mt-5 text-muted">Loading...</div>
    </main>

    <!-- MODALS (global) -->
    <!-- Add/Edit User Modal -->
    <div class="modal-overlay" id="userModal">
      <div class="modal-box">
        <div class="modal-head">
          <span id="userModalTitle">Add User</span
          ><button class="btn-icon" onclick="closeModal('userModal')">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editUserId" />
          <div class="form-group">
            <label>Full Name</label
            ><input
              class="form-ctrl"
              id="uName"
              placeholder="Enter full name"
            />
          </div>
          <div class="form-group">
            <label>Email Address</label
            ><input
              class="form-ctrl"
              id="uEmail"
              type="email"
              placeholder="email@example.com"
            />
          </div>
          <div class="form-group">
            <label>Role</label>
            <select class="form-ctrl" id="uRole">
              <option value="customer">Customer</option>
              <option value="seller">Seller</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-ctrl" id="uStatus">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
          <div class="form-group">
            <label>Password</label
            ><input
              class="form-ctrl"
              id="uPassword"
              type="password"
              placeholder="Set password"
            />
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn-ghost" onclick="closeModal('userModal')">
            Cancel
          </button>
          <button class="btn-primary-app" onclick="saveUser()">
            <i class="bi bi-check-lg"></i> Save
          </button>
        </div>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div class="modal-overlay" id="changePwdModal">
      <div class="modal-box">
        <div class="modal-head">
          <span>Change Password</span
          ><button class="btn-icon" onclick="closeModal('changePwdModal')">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Current Password</label
            ><input
              class="form-ctrl"
              type="password"
              id="cpCurrent"
              placeholder="Current password"
            />
          </div>
          <div class="form-group">
            <label>New Password</label
            ><input
              class="form-ctrl"
              type="password"
              id="cpNew"
              placeholder="New password"
            />
          </div>
          <div class="form-group">
            <label>Confirm Password</label
            ><input
              class="form-ctrl"
              type="password"
              id="cpConfirm"
              placeholder="Confirm new password"
            />
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn-ghost" onclick="closeModal('changePwdModal')">
            Cancel
          </button>
          <button class="btn-primary-app" onclick="submitChangePwd()">
            <i class="bi bi-lock-fill"></i> Update Password
          </button>
        </div>
      </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="deleteModal">
      <div class="modal-box" style="max-width: 380px">
        <div class="modal-head" style="color: #dc2626">Delete User</div>
        <div class="modal-body">
          <p style="font-size: 15px">
            Are you sure you want to delete
            <strong id="deleteUserName"></strong>? This action cannot be undone.
          </p>
        </div>
        <div class="modal-foot">
          <button class="btn-ghost" onclick="closeModal('deleteModal')">
            Cancel
          </button>
          <button
            class="btn-accent"
            style="background: #dc2626"
            onclick="confirmDelete()"
          >
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="../javascript/push-notification.js"></script>
    <script src="../javascript/shared.js"></script>
    <script src="../javascript/admin-profile.js"></script>
    <script src="../javascript/admin-dashboard.js"></script>
    <script src="../javascript/admin-manage-users.js"></script>
    <script src="../javascript/admin-notif.js"></script>
    <script>
      $(function () {
        loadPage("dashboard");
        renderNotifications();
      });
    </script>
  </body>
</html>
