<div>
  <div class="d-flex align-items-center justify-content-between mb-1">
    <div class="page-title">User Management</div>
    <button class="btn-primary-app" onclick="openUserModal()">
      <i class="bi bi-person-plus-fill"></i> New Admin
    </button>
  </div>
  <div class="page-sub">
    Admins can add, delete, search and modify all user accounts.
  </div>

  <div class="card-box">
    <div class="filter-row">
      <div class="search-input-wrap" style="max-width: 280px">
        <i class="bi bi-search"></i>
        <input
          class="form-ctrl"
          type="text"
          id="userSearch"
          placeholder="Search users…"
          oninput="renderUsers()"
        />
      </div>
      <select
        class="form-ctrl"
        style="width: auto"
        id="roleFilter"
        onchange="renderUsers()"
      >
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="seller">Seller</option>
        <option value="customer">Customer</option>
      </select>
    </div>
    <div style="overflow-x: auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>
  </div>
</div>
