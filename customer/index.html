<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarTTech — Marketplace</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/customer.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <!-- TOPBAR -->
    <header class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      <div class="logo">CarT<span>Tech</span></div>
      <div class="spacer"></div>
      <button
        class="notif-btn"
        onclick="toggleNotifPanel()"
        title="Notifications"
      >
        <i class="bi bi-bell"></i>
        <div class="notif-badge" id="notifDot"></div>
      </button>
      <div
        class="user-avatar"
        onclick="navigate('profile')"
        title="My Profile"
        id="avatarInitials"
      >
        CT
      </div>
    </header>

    <!-- Sidebar Overlay (mobile) -->
    <div
      class="sidebar-overlay"
      id="sidebarOverlay"
      onclick="toggleSidebar()"
    ></div>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Main</div>
        <div
          class="nav-item"
          data-page="dashboard"
          onclick="navigate('dashboard')"
        >
          <i class="bi bi-grid-1x2-fill"></i> Home
        </div>
        <div
          class="nav-item"
          data-page="products"
          onclick="navigate('products')"
        >
          <i class="bi bi-grid-3x3-gap-fill"></i> Browse Products
        </div>
        <div class="nav-item" data-page="cart" onclick="navigate('cart')">
          <i class="bi bi-cart"></i> My Cart
          <span class="count-badge" id="cartCount" style="display: none"
            >0</span
          >
        </div>
        <div class="nav-item" data-page="orders" onclick="navigate('orders')">
          <i class="bi bi-clock-history"></i> My Orders
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Account</div>
        <div class="nav-item" data-page="profile" onclick="navigate('profile')">
          <i class="bi bi-person-circle"></i> My Profile
        </div>
        <div class="nav-item" onclick="Logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </div>
      </div>
    </nav>

    <!-- NOTIFICATION PANEL -->
    <div class="notif-panel" id="notifPanel">
      <div class="notif-panel-head">
        <span>Notifications</span>
        <button
          class="btn-ghost"
          style="padding: 4px 10px; font-size: 12px"
          onclick="markAllRead()"
        >
          Mark all read
        </button>
      </div>
      <div id="notifList"></div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-wrap" id="toastWrap"></div>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="app">
      <!-- Pages will be dynamically loaded here -->
      <div class="text-center mt-5 text-muted">Loading...</div>
    </main>

    <!-- Change Password Modal -->
    <div class="modal-overlay" id="changePwdModal">
      <div class="modal-box">
        <div class="modal-head">
          <span>Change Password</span
          ><button class="btn-icon" onclick="closeModal('changePwdModal')">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Current Password</label
            ><input
              class="form-ctrl"
              type="password"
              id="cpCurrent"
              placeholder="Current password"
            />
          </div>
          <div class="form-group">
            <label>New Password</label
            ><input
              class="form-ctrl"
              type="password"
              id="cpNew"
              placeholder="New password"
            />
          </div>
          <div class="form-group">
            <label>Confirm Password</label
            ><input
              class="form-ctrl"
              type="password"
              id="cpConfirm"
              placeholder="Confirm new password"
            />
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn-ghost" onclick="closeModal('changePwdModal')">
            Cancel
          </button>
          <button class="btn-primary-app" onclick="submitChangePwd()">
            <i class="bi bi-lock-fill"></i> Update Password
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../javascript/shared.js"></script>
    <script src="../javascript/customer-dashboard.js"></script>
    <script src="../javascript/customer-products.js"></script>
    <script src="../javascript/customer-cart.js"></script>
    <script src="../javascript/customer-orders.js"></script>
    <script src="../javascript/customer-profile.js"></script>
    <script src="../javascript/customer-notif.js"></script>
    <script>
      $(function () {
        loadPage("dashboard");
        renderNotifications();
      });
    </script>
  </body>
</html>
