<div>
  <div class="page-title">Order History</div>
  <div class="page-sub">Track your orders and view order details</div>

  <!-- Filters -->
  <div class="filter-card mb-4">
    <div class="filter-row">
      <select
        id="txnStatusFilter"
        onchange="renderTransactions()"
        class="form-control-sm"
      >
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="processing">Processing</option>
        <option value="shipped">Shipped</option>
        <option value="delivered">Delivered</option>
        <option value="cancelled">Cancelled</option>
      </select>

      <select
        id="txnSortField"
        onchange="renderTransactions()"
        class="form-control-sm"
      >
        <option value="created_at">Sort by Date</option>
        <option value="order_number">Sort by Order #</option>
        <option value="total">Sort by Amount</option>
        <option value="status">Sort by Status</option>
      </select>

      <select
        id="txnSortDir"
        onchange="renderTransactions()"
        class="form-control-sm"
      >
        <option value="desc">Newest First</option>
        <option value="asc">Oldest First</option>
      </select>

      <div class="search-input-wrap" style="max-width: 250px">
        <i class="bi bi-search"></i>
        <input
          type="text"
          id="txnSearch"
          placeholder="Search orders..."
          oninput="renderTransactions()"
          class="form-control-sm"
        />
      </div>
    </div>
  </div>

  <!-- Orders Table -->
  <div class="card-box" style="overflow-x: auto">
    <table class="orders-table">
      <thead>
        <tr>
          <th onclick="cycleTxnSort('order_number')">
            Order ID <i class="bi bi-arrow-down-up"></i>
          </th>
          <th onclick="cycleTxnSort('order_number')">
            Items <i class="bi bi-arrow-down-up"></i>
          </th>
          <th onclick="cycleTxnSort('total')">
            Total Amount <i class="bi bi-arrow-down-up"></i>
          </th>
          <th onclick="cycleTxnSort('status')">
            Status <i class="bi bi-arrow-down-up"></i>
          </th>
          <th onclick="cycleTxnSort('created_at')">
            Date <i class="bi bi-arrow-down-up"></i>
          </th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="txnTableBody">
        <tr>
          <td colspan="6" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">Loading orders...</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div id="txnPagination" class="pagination-wrapper mt-4"></div>
</div>
