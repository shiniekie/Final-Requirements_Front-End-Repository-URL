<div>
  <div class="page-title">My Profile</div>
  <div class="page-sub">View and update your account information.</div>
  <div class="row g-3">
    <div class="col-lg-5">
      <div class="card-box" style="padding: 24px">
        <div class="d-flex align-items-center gap-3 mb-4">
          <div class="profile-avatar" id="profileAvatar">SL</div>
          <div>
            <div
              style="
                font-family: var(--font-head);
                font-size: 20px;
                font-weight: 700;
              "
              id="profileName"
            >
              Seller User
            </div>
            <div
              style="font-size: 13px; color: var(--text-muted)"
              id="profileRole"
            >
              Seller
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>Full Name</label
          ><input
            class="form-ctrl"
            id="pName"
            value="Seller User"
            onchange="updateAvatarInitials()"
          />
        </div>
        <div class="form-group">
          <label>Email Address</label
          ><input class="form-ctrl" id="pEmail" value="seller@shophub.com" />
        </div>
        <div class="form-group">
          <label>Contact Number</label
          ><input class="form-ctrl" id="pPhone" value="+63 912 345 6789" />
        </div>
        <div class="form-group">
          <label>Address</label
          ><textarea class="form-ctrl" id="pAddress" rows="2">
123 Main Street, Pagadian City</textarea
          >
        </div>
        <div class="form-group">
          <label>Profile</label
          ><input type="file" class="form-ctrl" id="profile_pic" />
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn-primary-app" onclick="saveProfile()">
            <i class="bi bi-check-lg"></i> Save Changes
          </button>
          <button class="btn-ghost" onclick="openChangePwd()">
            <i class="bi bi-lock"></i> Change Password
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
